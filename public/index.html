<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>My Library · The Manufacturing Strategy Series</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- TOP BAR -->
<div id="bar">
  <div class="bar-left">
    <span class="bar-series">The Manufacturing Strategy Series</span>
  </div>
  <div class="bar-right">
    <button class="btn btn-ghost" id="logout-btn" style="display:none" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- STAGE — screens injected here -->
<div id="stage"></div>

<!-- FULL-PAGE LOADER -->
<div id="app-loader">
  <div class="loader-dot"></div>
</div>

<!-- ERROR STATE -->
<div id="app-error">
  <div class="error-wrap">
    <div class="error-title">Something went wrong</div>
    <div class="error-body">Please refresh the page. If the problem continues, email info@sudharsankr.co.in</div>
    <button class="btn btn-primary" onclick="location.reload()">Refresh</button>
  </div>
</div>

<script type="module" src="/app.js?v=2"></script>
</body>
</html>
